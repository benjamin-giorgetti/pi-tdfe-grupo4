<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <title>Login</title>
</head>


<body class="loginBody">
  <header class="loginHeader">
            <div class="headerContenido">
                <div class="divLoginLogo">
                    <a href="./index.html">
                        <img src="./img/logo.png" alt="Relojeame logo" class="logoLogin">
                    </a>
                </div>
                <div class="headerBuscador">
                    <form action="./search-results.html" method="GET">
                        <input type="text" name="busqueda" placeholder="Buscar productos...">
                        <button type="submit">Buscar</button>
                    </form>
                </div>
                <div class="headerUsuario">
                    <a href="./login.html">Login</a>
                    <a href="./register.html">Registrate</a>
                </div>
            </div>
            
            <nav>
                <ul class="navLista">
                    <li class="navItem"><a class="navLink" href="./index.html">HOME</a></li>
                    <li class="navItem"><a class="navLink" href="./product.html">PRODUCTOS</a></li>
                    <li class="navItem"><a class="navLink" href="./category.html">CATEGORÍAS</a></li>
                </ul>
            </nav>
 </header>
 <div class="divMegacaja">
    <h1 class="loginH1">Login</h1>
        <form action="./index.html" method="GET">
            <div class="divLogin">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="divLogin">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password">
            </div>

            <div class="divRecordarme">
                <input type="checkbox" id="recordarme" name="recordarme">
                <label for="recordarme">Recordarme</label>
            </div>
            <div class="divLogin">
                <input type="submit" value="Iniciar Sesión">
            </div>

            <div class="divHaciaRegister">
                <p>¿No tenés una cuenta? <a class="linkRegister" href="./register.html">Registrate</a></p>
            </div>          
        </form>
 </div>
 <footer class="footerLogin">
            <p>Franco Mariani | Benjamin Giorgetti | Jose Gimenez Kesseru</p>
</footer>
    
    


</body>

</html>
