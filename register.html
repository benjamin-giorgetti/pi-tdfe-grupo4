    <div class="divRegister">
        <h1 class="registerH1">Registrate</h1>
        <form action="./index.html" method="GET">
            <div class="inputRegister">
                <label for="username">Usuario:</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="inputRegister">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="inputRegister">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password">
            </div>

            <div class="inputRegister">
                <label for="nacionalidad">Nacionalidad:</label>
                <select name="nacionalidad" id="nacionalidad">
                    <option value="">Seleccione una nacionalidad</option>
                    <option value="Argentina">Argentina</option>
                    <option value="Uruguay">Uruguay</option>
                    <option value="Chile">Chile</option>
                    <option value="Brasil">Brasil</option>
                    <option value="Colombia">Colombia</option>
                </select>
            </div>

            <div class="divGenero">
                <p class="pGenero">Género:</p>
                <input type="radio" name="genero" value="masculino" id="generoMasculino">
                <label for="generoMasculino">Masculino</label>
                <input type="radio" name="genero" value="femenino" id="generoFemenino">
                <label for="generoFemenino">Femenino</label>
                <input type="radio" name="genero" value="otro" id="generoOtro">
                <label for="generoOtro">Otro</label>
            </div>

            <div class="divHobbies">
                <p class="pHobbies">Hobbies:</p>
                <input type="checkbox" name="hobbies" id="hobbyLeer" value="leer">
                <label for="hobbyLeer">Leer</label>
                <input type="checkbox" name="hobbies" id="hobbyDeporte" value="deporte">
                <label for="hobbyDeporte">Deporte</label>
                <input type="checkbox" name="hobbies" id="hobbyMusica" value="musica">
                <label for="hobbyMusica">Música</label>
                <input type="checkbox" name="hobbies" id="hobbyViajar" value="viajar">
                <label for="hobbyViajar">Viajar</label>
                <input type="checkbox" name="hobbies" id="hobbyCocina" value="cocina">
                <label for="hobbyCocina">Cocina</label>
            </div>
            <div class="inputRegister">
                <label for="contanosSobreVos">Contanos sobre vos:</label>
                <textarea name="contanosSobreVos" id="contanosSobreVos" rows="5"></textarea>
            </div>
            <div class="divTerminos">
                <input type="checkbox" name="terminos" id="terminos" required>
                <label for="terminos">Acepto los términos y condiciones</label>
            </div>
