<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <title>Registro</title>
</head>
<body class="register-body">
    <header class="registerHeader">
            <div class="header-contenido">
                <div class="pivRegisterLogo">
                    <a href="./index.html">
                        <img src="./img/logo.png" alt="Relojeame logo" class="logoRegister">
                    </a>
                </div>
            </div>
    </header>
    <div class="divRegister">
        <h1 class="register-h1">Registrate</h1>
        <form action="./index.html" method="GET">
            <div class="div-register">
                <label for="username">Usuario:</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="div-register">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="div-register">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password">
            </div>

            <div class="div-register">
                <label for="nacionalidad">Nacionalidad:</label>
                <select name="nacionalidad" id="nacionalidad">
                    <option value="">Seleccione una nacionalidad</option>
                    <option value="Argentina">Argentina</option>
                    <option value="Uruguay">Uruguay</option>
                    <option value="Chile">Chile</option>
                    <option value="Brasil">Brasil</option>
                    <option value="Colombia">Colombia</option>
                </select>
            </div>

            <div class="div-genero">
                <p class="pGenero">Género:</p>
                <input type="radio" name="genero" value="masculino" id="genero-masculino">
                <label for="genero-masculino">Masculino</label>
                <input type="radio" name="genero" value="femenino" id="genero-femenino">
                <label for="genero-femenino">Femenino</label>
                <input type="radio" name="genero" value="otro" id="genero-otro">
                <label for="genero-otro">Otro</label>
            </div>

            <div class="div-hobbies">
                <p class="pHobbies">Hobbies:</p>
                <input type="checkbox" name="hobbies" id="hobby-leer" value="leer">
                <label for="hobby-leer">Leer</label>
                <input type="checkbox" name="hobbies" id="hobby-deporte" value="deporte">
                <label for="hobby-deporte">Deporte</label>
                <input type="checkbox" name="hobbies" id="hobby-musica" value="musica">
                <label for="hobby-musica">Música</label>
                <input type="checkbox" name="hobbies" id="hobby-viajar" value="viajar">
                <label for="hobby-viajar">Viajar</label>
                <input type="checkbox" name="hobbies" id="hobby-cocina" value="cocina">
                <label for="hobby-cocina">Cocina</label>
            </div>
            <div class="div-register">
                <label for="contanos-sobre-vos">Contanos sobre vos:</label>
                <textarea name="contanos-sobre-vos" id="contanos-sobre-vos" rows="5"></textarea>
            </div>
            <div class="div-terminos">
                <input type="checkbox" name="terminos" id="terminos" required>
                <label for="terminos">Acepto los términos y condiciones</label>
            </div>
            <div class="div-register">
                <button type="submit">Enviar</button>
                <button type="reset">Resetear</button>
            </div>

            <div class="div-hacia-login">
                <p>¿Ya tenes cuenta? <a class="link-login" href="./login.html">Inicia sesión</a></p>
            </div>
        </form>
    </div>
<footer>
            <p>Franco Mariani | Benjamin Giorgetti | Jose Gimenez Kesseru</p>
</footer>
</body>
</html>
